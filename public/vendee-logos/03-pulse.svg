<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="46" fill="white" stroke="#e2e8f0" stroke-width="2"/>
  <!-- V drawn as a stylized waveform / financial chart bar arrangement -->
  <g fill="url(#pulseGrad)">
    <rect x="44"  y="60"  width="14" height="48" rx="4"/>
    <rect x="64"  y="74"  width="14" height="52" rx="4"/>
    <rect x="84"  y="92"  width="14" height="56" rx="4"/>
    <rect x="104" y="80"  width="14" height="48" rx="4"/>
    <rect x="124" y="64"  width="14" height="44" rx="4"/>
    <rect x="144" y="48"  width="14" height="40" rx="4"/>
  </g>
  <!-- Subtle connecting line emphasising V curve -->
  <path d="M51 60 L91 92 L151 48"
        stroke="url(#pulseGrad)" stroke-width="3"
        stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4"/>
</svg>
